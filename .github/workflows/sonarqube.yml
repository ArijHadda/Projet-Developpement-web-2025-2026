name: CI/CD Pipeline with SonarQube and Javadoc

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ==========================================
  # Étape 1 : CI, Vérification Javadoc & SonarQube
  # ==========================================
  build-test-analyze:
    name: CI, Javadoc & SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Désactiver le clonage superficiel (shallow clone) pour garantir une meilleure pertinence de l'analyse SonarQube
          fetch-depth: 0  

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 1. Phase CI : Compilation et exécution des tests unitaires
      # Utiliser 'clean verify' pour s'assurer que le code compile et que tous les tests passent
      - name: Build and Test
        run: mvn -B clean verify

      # 2. Phase de vérification de la conformité Javadoc
      # Générer et vérifier la Javadoc. -DfailOnError=true interrompt le pipeline en cas d'erreur de syntaxe
      - name: Check Javadoc Compliance
        run: mvn -B javadoc:javadoc -DfailOnError=true -DfailOnWarnings=false
        
      # 3. Phase d'analyse de qualité SonarQube
      # Exécuter l'analyse uniquement après la validation des tests et de la documentation
      - name: SonarQube Analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=ArijHadda_sharePortfolioMiageIndistrualisationTP3

  # ==========================================
  # Étape 2 : CD (Déploiement Continu)
  # ==========================================
  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    # Dépendance : on attend que l'étape de build/test/analyse réussisse
    needs: build-test-analyze 
    # Condition : exécuter le déploiement uniquement lors d'un push sur la branche 'main'
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      # Espace réservé pour le déploiement CD. Remplacez par vos propres commandes de déploiement
      - name: Deploy to Server/Cloud
        run: |
          echo "✅ Pipeline CI/CD réussi ! Préparation du déploiement..."
          echo "Vous pouvez ajouter vos scripts de déploiement ici. Par exemple :"
          echo " - Construire et pousser l'image Docker"
          echo " - Copier le fichier jar via scp vers le serveur distant et redémarrer le service"
          echo " - Déployer sur des plateformes cloud comme Heroku, AWS ou Azure"
