<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - KudoSport</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-register">
    <div class="auth-page">
        <div class="card auth-card fade-in">
            <div class="logo">🎯</div>
            <h2>Rejoignez KudoSport</h2>
            <p class="text-center mb-lg" style="color: var(--color-gray-600);">Commencez votre aventure sportive dès aujourd'hui</p>
            
            <div th:if="${error}" class="alert alert-danger">
                <p th:text="${error}" class="mb-0"></p>
            </div>
            
            <form th:action="@{/user/register}" method="post">
                <div class="grid grid-2" style="gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Nom :</label>
                        <input type="text" name="nom" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Prénom :</label>
                        <input type="text" name="prenom" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email :</label>
                    <input type="email" name="mail" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Mot de passe :</label>
                    <input type="password" name="mdp" class="form-control" required>
                </div>
                
                <div class="grid grid-3" style="gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Sexe :</label>
                        <select name="sexe" class="form-control" required>
                            <option value="M">Homme</option>
                            <option value="F">Femme</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Âge :</label>
                        <input type="number" name="age" class="form-control" min="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Taille (cm) :</label>
                        <input type="number" name="taille" class="form-control" min="50" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Poids (kg) :</label>
                    <input type="number" step="0.1" name="poids" class="form-control" min="10" required>
                </div>
                
                <button type="submit" class="btn btn-secondary btn-lg" style="width: 100%;">S'inscrire</button>
            </form>
            
            <div class="divider"></div>
            
            <p class="text-center mb-0">
                Déjà un compte ? 
                <a th:href="@{/user/login}">Se connecter</a>
            </p>
        </div>
    </div>
</body>
</html>
