<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une activité</title>
</head>
<body>
    <h1>Ajouter une activité</h1>
    <form action="/activite/add-activite" method="post">
        <label for="nom">Nom de l'activité :</label>
        <input type="text" id="nom" name="nom" required>
        <br>
        <label for="date">Date de l'activité :</label>
        <!-- The model uses String for date -->
        <input type="date" id="date" name="date" required>
        <br>
        <label for="duree">Durée (minutes) :</label>
        <input type="number" id="duree" name="duree" required>
        <br>
        <label for="distance">Distance (km) :</label>
        <input type="number" step="0.1" id="distance" name="distance" required>
        <br>
        <label for="note">Note de l'activité (sur 10) :</label>
        <input type="number" id="note" name="note" min="0" max="10" required>
        <br>
        <button type="submit">Ajouter l'activité</button>
    </form>    
    <a href="/user/profile">Retour au profil</a>
</body>
</html>
