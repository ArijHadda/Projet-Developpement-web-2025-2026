<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une activité - KudoSport</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-activities">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/user/profile/{id}(id=${user.id})}" class="navbar-brand">
                🏃 KudoSport
            </a>
            <ul class="navbar-nav">
                <li><a th:href="@{/activite/list}">Mes Activités</a></li>
                <li><a th:href="@{/objectif/list}">Objectifs</a></li>
                <li><a th:href="@{/challenge/list}">Challenges</a></li>
                <li><a th:href="@{/user/ami/chercher}">Amis</a></li>
                <li><a th:href="@{/user/logout}">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 2rem auto;">
            <h1>➕ Ajouter une activité</h1>
            
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
            
            <form action="/activite/add-activite" method="post">
                <div class="form-group">
                    <label for="nom">🏃 Type d'activité</label>
                    <select id="nom" name="nom" class="form-control" required onchange="toggleFields()">
                        <option value="" disabled selected>-- Choisir un sport --</option>
                        <option th:each="sport : ${sports}"
                                th:value="${sport.nom}"
                                th:text="${sport.nom}"
                                th:attr="data-is-speed=${sport.estBaseSurVitesse ?: false}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">📅 Date de l'activité</label>
                    <input type="date" id="date" name="date" class="form-control" th:attr="max=${today}" required>
                </div>

                <div class="form-group">
                    <label for="duree">⏱️ Durée (minutes)</label>
                    <input type="number" id="duree" name="duree" class="form-control" min="1" required>
                </div>

                <div id="distanceGroup" class="form-group" style="display: none;">
                    <label for="distance">📏 Distance (km)</label>
                    <input type="number" step="0.1" id="distance" name="distance" class="form-control" min="0" value="0">
                </div>

                <div id="intensityGroup" class="form-group" style="display: none;">
                    <label for="niveauIntensite">💪 Niveau d'intensité (1 à 5)</label>
                    <input type="number" id="niveauIntensite" name="niveauIntensite" class="form-control" min="1" max="5" value="3">
                </div>

                <div class="form-group">
                    <label for="note">⭐ Note de l'activité (de 1 à 10)</label>
                    <input type="number" id="note" name="note" class="form-control" min="1" max="10" required>
                </div>

                <div class="flex gap-sm" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">💾 Ajouter l'activité</button>
                    <a th:href="@{/user/profile/{id}(id=${user.id})}" class="btn btn-outline">🔙 Retour au profil</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleFields() {
            const select = document.getElementById('nom');
            const selectedOption = select.options[select.selectedIndex];
            const isSpeed = selectedOption.getAttribute('data-is-speed') === 'true';

            const distanceGroup = document.getElementById('distanceGroup');
            const intensityGroup = document.getElementById('intensityGroup');

            if (isSpeed) {
                distanceGroup.style.display = 'block';
                intensityGroup.style.display = 'none';
                document.getElementById('niveauIntensite').value = 1;
            } else {
                distanceGroup.style.display = 'none';
                intensityGroup.style.display = 'block';
                document.getElementById('distance').value = 0;
            }
        }
    </script>
</body>
</html>
