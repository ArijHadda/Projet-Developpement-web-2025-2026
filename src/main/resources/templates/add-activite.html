<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une activité</title>
</head>
<body>
    <h1>Ajouter une activité</h1>
    <form action="/activite/add-activite" method="post">
        <label for="nom">Type d'activité :</label>
        <select id="nom" name="nom" required onchange="toggleFields()">
            <option value="" disabled selected>-- Choisir un sport --</option>
            <option th:each="sport : ${sports}"
                    th:value="${sport.nom}"
                    th:text="${sport.nom}"
                    th:attr="data-is-speed=${sport.estBaseSurVitesse ?: false}">
            </option>
        </select>
        <br><br>

        <label for="date">Date de l'activité :</label>
        <input type="date" id="date" name="date" required>
        <br><br>

        <label for="duree">Durée (minutes) :</label>
        <input type="number" id="duree" name="duree" required>
        <br><br>

        <!-- Champ Distance : Affiché uniquement pour les sports de vitesse -->
        <div id="distanceGroup" style="display: none;">
            <label for="distance">Distance (km) :</label>
            <input type="number" step="0.1" id="distance" name="distance" value="0">
            <br><br>
        </div>

        <!-- Champ Intensité : Affiché uniquement pour les sports de niveau -->
        <div id="intensityGroup" style="display: none;">
            <label for="niveauIntensite">Niveau d'intensité (1 à 5) :</label>
            <input type="number" id="niveauIntensite" name="niveauIntensite" min="1" max="5" value="3">
            <br><br>
        </div>

        <label for="note">Note de l'activité (sur 10) :</label>
        <input type="number" id="note" name="note" min="0" max="10" required>
        <br><br>

        <button type="submit">Ajouter l'activité</button>
    </form>    

    <script>
        function toggleFields() {
            const select = document.getElementById('nom');
            const selectedOption = select.options[select.selectedIndex];
            const isSpeed = selectedOption.getAttribute('data-is-speed') === 'true';

            const distanceGroup = document.getElementById('distanceGroup');
            const intensityGroup = document.getElementById('intensityGroup');

            if (isSpeed) {
                distanceGroup.style.display = 'block';
                intensityGroup.style.display = 'none';
                document.getElementById('niveauIntensite').value = 1; // 修正：设为 1 以符合 min="1" 限制
            } else {
                distanceGroup.style.display = 'none';
                intensityGroup.style.display = 'block';
                document.getElementById('distance').value = 0; // Reset
            }
        }
    </script>
    <a th:href="@{/user/profile/{id}(id=${user.id})}">Retour au profil</a>
</body>
</html>
