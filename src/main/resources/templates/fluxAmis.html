<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flux d'activités de mes amis</title>
    <style>
        .activite-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f9f9f9;
            max-width: 600px;
        }
        .activite-header {
            font-weight: bold;
            color: #0056b3;
            margin-bottom: 10px;
        }
        .activite-stats span {
            margin-right: 15px;
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
<h2>🌟 Activités de mes amis</h2>

<a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}">
    <button type="button">← Retour au profil</button>
</a>
<hr/>

<div th:if="${#lists.isEmpty(fluxActivites)}">
    <p>Il n'y a aucune activité récente. Allez chercher des amis ou attendez qu'ils fassent du sport !</p>
</div>

<div th:each="act : ${fluxActivites}" class="activite-card">
    <div class="activite-header">
        <span th:text="${act.utilisateur.prenom + ' ' + act.utilisateur.nom}"></span>
        a fait du <span th:text="${act.nom}"></span> !
    </div>

    <p style="font-size: 0.85em; color: gray;">
        📅 Le <span th:text="${act.date}"></span>
    </p>

    <div class="activite-stats">
        <span>⏱️ Durée : <span th:text="${act.duree}"></span> min</span>
        <span th:if="${act.sport != null and act.sport.estBaseSurVitesse}">📏 Distance : <span th:text="${act.distance}"></span> km</span>
        <span th:if="${act.sport == null or !act.sport.estBaseSurVitesse}">💪 Intensité : <span th:text="${act.niveauIntensite}"></span>/5</span>
        <span>🔥 Calories : <span th:text="${act.caloriesConsommees}"></span> kcal</span>
        <span>👍 <span th:text="${act.nbKudos}"></span> Kudos</span>
    </div>

    <br>
    <form th:action="@{/activite/flux/kudos/{id}(id=${act.id})}" method="post" style="display: inline;">
        <button th:if="${!#lists.contains(act.likers.![id], session.loggedInUser.id)}"
                type="submit"
                style="background-color: #ff9800; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
            👏 Bravo !
        </button>

        <button th:if="${#lists.contains(act.likers.![id], session.loggedInUser.id)}"
                type="submit"
                style="background-color: #ccc; color: #333; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
            ✖ Retirer le Bravo
        </button>
    </form>
        <hr/>
        <div class="comments-section" style="font-size: 0.9em; background: #eee; padding: 10px; border-radius: 4px;">
            <p><strong>Commentaires :</strong></p>
            <div th:each="com : ${act.commentaires}" style="margin-bottom: 5px; border-bottom: 1px dashed #ccc;">
                <b th:text="${com.auteur.prenom}"></b> :
                <span th:text="${com.contenu}"></span>
            </div>

            <form th:action="@{/activite/flux/comment/{id}(id=${act.id})}" method="post" style="margin-top: 10px;">
                <input type="text" name="contenu" placeholder="Écrire un message..." required style="width: 70%;">
                <button type="submit">Envoyer</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
