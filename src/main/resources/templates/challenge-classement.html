<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement du Challenge - KudoSport</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-challenges">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}" class="navbar-brand">
                🏃 KudoSport
            </a>
            <ul class="navbar-nav">
                <li><a th:href="@{/activite/list}">Mes Activités</a></li>
                <li><a th:href="@{/objectif/list}">Objectifs</a></li>
                <li><a th:href="@{/challenge/list}">Challenges</a></li>
                <li><a th:href="@{/user/ami/chercher}">Amis</a></li>
                <li><a th:href="@{/user/logout}">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="flex justify-between items-center" style="margin: 2rem 0;">
            <h1>📊 Classement du Challenge</h1>
            <a th:href="@{/challenge/list}" class="btn btn-outline">
                🔙 Retour aux challenges
            </a>
        </div>

        <div th:if="${#lists.isEmpty(classementList)}" class="alert alert-info">
            <p>ℹ️ Il n'y a pas encore de participants ou d'activités pour ce challenge.</p>
        </div>

        <div th:unless="${#lists.isEmpty(classementList)}" class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>🏆 Rang</th>
                        <th>👤 Participant</th>
                        <th>🔥 Calories Brûlées (kcal)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="dto, iterStat : ${classementList}">
                        <td>
                            <span th:if="${iterStat.count == 1}" class="badge badge-success">🥇 1er</span>
                            <span th:if="${iterStat.count == 2}" class="badge badge-info">🥈 2ème</span>
                            <span th:if="${iterStat.count == 3}" class="badge badge-warning">🥉 3ème</span>
                            <span th:if="${iterStat.count > 3}" th:text="${iterStat.count} + 'ème'"></span>
                        </td>
                        <td th:text="${dto.nomComplet}">Nom du participant</td>
                        <td>
                            <div class="flex items-center gap-sm">
                                <div class="progress" style="flex: 1; max-width: 200px;">
                                    <div class="progress-bar" th:style="'width: ' + (${iterStat.count == 1} ? '100' : (${dto.totalCalories * 100 / classementList[0].totalCalories})) + '%'"></div>
                                </div>
                                <strong th:text="${dto.totalCalories}">0</strong>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
