<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier une activité - SportTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-activities">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}" class="navbar-brand">
                🏃 SportTrack
            </a>
            <ul class="navbar-nav">
                <li><a th:href="@{/activite/list}">Mes Activités</a></li>
                <li><a th:href="@{/objectif/list}">Objectifs</a></li>
                <li><a th:href="@{/challenge/list}">Challenges</a></li>
                <li><a th:href="@{/user/ami/chercher}">Amis</a></li>
                <li><a th:href="@{/user/logout}">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>✏️ Modifier l'activité</h1>
            <p class="text-muted">
                <span th:text="${activite.nom}"></span> (ID: <span th:text="${activite.id}"></span>)
            </p>
            
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
            
            <form th:action="@{/activite/modifier/{idActivite}(idActivite=${activite.id})}" method="post">
                <table class="table">
                    <thead>
                        <tr>
                            <th>🏃 Activité</th>
                            <th>📅 Date</th>
                            <th>⏱️ Durée (min)</th>
                            <th>📏 Distance / 💪 Intensité</th>
                            <th>⭐ Note (/10)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td th:text="${activite.nom}" rowspan="2"></td>
                            <td th:text="${activite.date}"></td>
                            <td th:text="${activite.duree}"></td>
                            <td>
                                <span th:if="${activite.sport != null and activite.sport.estBaseSurVitesse}">
                                    <span th:text="${activite.distance}"></span> km
                                </span>
                                <span th:unless="${activite.sport != null and activite.sport.estBaseSurVitesse}">
                                    Niveau <span th:text="${activite.niveauIntensite}"></span>
                                </span>
                            </td>
                            <td th:text="${activite.note}"></td>
                        </tr>
                        <tr>
                            <td><input type="date" id="date" name="date" class="form-control" th:value="${activite.date}" th:attr="max=${today}"></td>
                            <td><input type="number" id="duree" name="duree" class="form-control" th:value="${activite.duree}"></td>
                            <td>
                                <input th:if="${activite.sport != null and activite.sport.estBaseSurVitesse}"
                                       type="number" step="0.1" id="distance" name="distance" class="form-control" th:value="${activite.distance}">
                                <input th:unless="${activite.sport != null and activite.sport.estBaseSurVitesse}"
                                       type="number" id="niveauIntensite" name="niveauIntensite" class="form-control" min="1" max="5" th:value="${activite.niveauIntensite}">
                            </td>
                            <td><input type="number" id="note" name="note" class="form-control" min="1" max="10" th:value="${activite.note}"></td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="flex gap-sm" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">💾 Valider les modifications</button>
                    <a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}" class="btn btn-outline">🔙 Retour au profil</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
