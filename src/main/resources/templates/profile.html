<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profil Utilisateur</title>
    <link rel="stylesheet" th:href="@{/css/sport.css}">
</head>
<body>
<h2>Mon Profil</h2>
<div class="profile-actions">
    <a th:href="@{/user/profile/update/{IdU}(IdU=${userProfile.id})}">
        <button type="button">Modifier mes infos</button>
    </a>
    <a th:href="@{/user/profile/update-password/{IdU}(IdU=${userProfile.id})}">
        <button type="button">Modifier le mot de passe</button>
    </a>
    <a th:href="@{/user/profile/voirUtilisateur}">
        <button type="button">Voir liste des utilisateurs</button>
    </a>
</div>
<hr/> <p>Bienvenue sur votre espace personnel ! Voici vos informations :</p>

<div style="margin-bottom: 20px;">
    <p><strong>ID :</strong> <span th:text="${userProfile.id}"></span></p>
    <p><strong>Nom :</strong> <span th:text="${userProfile.nom}"></span></p>
    <p><strong>Prénom :</strong> <span th:text="${userProfile.prenom}"></span></p>
    <p><strong>Email :</strong> <span th:text="${userProfile.mail}"></span></p>
    <p><strong>Sexe :</strong> <span th:text="${userProfile.sexe}"></span></p>
    <p><strong>Age :</strong> <span th:text="${userProfile.age}"></span></p>
    <p><strong>Taille :</strong> <span th:text="${userProfile.taille}"></span></p>
    <p><strong>Poids :</strong> <span th:text="${userProfile.poids}"></span></p>
</div>

<hr/>

<div>
    <a th:href="@{/user/logout}">
        <button type="button">Se déconnecter</button>
    </a>
</div>

</body>
</html>
