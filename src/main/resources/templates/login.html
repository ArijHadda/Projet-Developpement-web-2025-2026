<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SportTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-login">
    <div class="auth-page">
        <div class="card auth-card fade-in">
            <div class="logo">🏃</div>
            <h2>SportTrack</h2>
            <p class="text-center mb-lg" style="color: var(--color-gray-600);">Connectez-vous pour poursuivre votre parcours sportif</p>
            
            <div th:if="${error}" class="alert alert-danger">
                <p th:text="${error}" class="mb-0"></p>
            </div>
            
            <form th:action="@{/user/login}" method="post">
                <div class="form-group">
                    <label class="form-label">Email :</label>
                    <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mot de passe :</label>
                    <input type="password" name="password" class="form-control" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Se connecter</button>
            </form>
            
            <div class="divider"></div>
            
            <p class="text-center mb-0">
                Pas encore de compte ? 
                <a th:href="@{/user/register}">Créer un compte</a>
            </p>
        </div>
    </div>
</body>
</html>
