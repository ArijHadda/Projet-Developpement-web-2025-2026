<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer / Modifier un Objectif</title>
    <style>
        .form-container { max-width: 500px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-submit { background-color: #0275d8; color: white; padding: 10px 15px; border: none; cursor: pointer; width: 100%; }
        .btn-cancel { background-color: #6c757d; color: white; padding: 10px 15px; text-decoration: none; display: block; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<h2 th:text="${objectif.id == null ? '➕ Créer un nouvel Objectif' : '✏️ Modifier l''Objectif'}"></h2>

<div class="form-container">
    <form th:action="@{/objectif/save}" th:object="${objectif}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="titre">Titre (Ex: Courir 50km ce mois) :</label>
            <input type="text" id="titre" th:field="*{titre}" required placeholder="Mon super objectif..." />
        </div>

        <div class="form-group">
            <label for="sport">Sport concerné :</label>
            <select id="sport" th:field="*{sport}" required onchange="toggleObjectifFields()">
                <option value="" disabled th:selected="${objectif.sport == null}">-- Choisir un sport --</option>
                <option th:each="s : ${sports}"
                        th:value="${s.id}"
                        th:text="${s.nom}"
                        th:attr="data-is-speed=${s.estBaseSurVitesse}"></option>
            </select>
        </div>

        <div class="form-group" id="distanceGroup">
            <label for="distance">Distance cible (en km) :</label>
            <input type="number" step="0.1" id="distance" th:field="*{distance}" min="0" />
        </div>

        <div class="form-group">
            <label for="duree">Durée cible (en minutes) :</label>
            <input type="number" id="duree" th:field="*{duree}" min="0" required />
        </div>

        <button type="submit" class="btn-submit">💾 Enregistrer l'objectif</button>
    </form>

    <a th:href="@{/objectif/list}" class="btn-cancel">❌ Annuler</a>
</div>

<script>
    function toggleObjectifFields() {
        const select = document.getElementById('sport');
        const selectedOption = select.options[select.selectedIndex];

        // 如果用户还没选，或者选了默认的提示选项，就不做操作
        if (!selectedOption || !selectedOption.hasAttribute('data-is-speed')) {
            return;
        }

        // 读取刚才绑定的 estBaseSurVitesse 的值
        const isSpeed = selectedOption.getAttribute('data-is-speed') === 'true';
        const distanceGroup = document.getElementById('distanceGroup');
        const distanceInput = document.getElementById('distance');

        if (isSpeed) {
            // 如果是跑步等速度型运动，显示距离框
            distanceGroup.style.display = 'block';
        } else {
            // 如果是健身等非速度型运动，隐藏距离框，并把值清零
            distanceGroup.style.display = 'none';
            distanceInput.value = 0;
        }
    }

    // 页面加载完成后立刻执行一次（为了适配点击"修改"进入表单时的情况）
    window.onload = function() {
        toggleObjectifFields();
    };
</script>

</body>
</html>
