<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectif - KudoSport</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-activities">
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}" class="navbar-brand">
                🏃 KudoSport
            </a>
            <ul class="navbar-nav">
                <li><a th:href="@{/activite/list}">Mes Activités</a></li>
                <li><a th:href="@{/objectif/list}">Objectifs</a></li>
                <li><a th:href="@{/challenge/list}">Challenges</a></li>
                <li><a th:href="@{/user/ami/chercher}">Amis</a></li>
                <li><a th:href="@{/user/logout}">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 2rem auto;">
            <h1 th:text="${objectif.id == null} ? '➕ Créer un nouvel Objectif' : '✏️ Modifier Objectif'"></h1>

            <form th:action="@{/objectif/save}" th:object="${objectif}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="titre">🎯 Titre (Ex: Courir 50km ce mois)</label>
                    <input type="text" id="titre" th:field="*{titre}" class="form-control" required placeholder="Mon super objectif..." />
                </div>

                <div class="form-group">
                    <label for="sport">🏃 Sport concerné</label>
                    <select id="sport" th:field="*{sport}" class="form-control" required onchange="toggleObjectifFields()">
                        <option value="" disabled th:selected="${objectif.sport == null}">-- Choisir un sport --</option>
                        <option th:each="s : ${sports}"
                                th:value="${s.id}"
                                th:text="${s.nom}"
                                th:attr="data-is-speed=${s.estBaseSurVitesse}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="frequence">📅 Période de l'objectif</label>
                    <select id="frequence" th:field="*{frequence}" class="form-control" required>
                        <option value="QUOTIDIEN">Quotidien (Aujourd'hui)</option>
                        <option value="HEBDOMADAIRE">Hebdomadaire (Cette semaine)</option>
                        <option value="MENSUEL" selected>Mensuel (Ce mois-ci)</option>
                        <option value="ANNUEL">Annuel (Cette année)</option>
                    </select>
                </div>

                <div class="form-group" id="distanceGroup">
                    <label for="distance">📏 Distance cible (en km)</label>
                    <input type="number" step="0.1" id="distance" th:field="*{distance}" class="form-control" min="0" />
                </div>

                <div class="form-group">
                    <label for="duree">⏱️ Durée cible (en minutes)</label>
                    <input type="number" id="duree" th:field="*{duree}" class="form-control" min="0" required />
                </div>

                <div class="flex gap-sm" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                    <a th:href="@{/objectif/list}" class="btn btn-outline">❌ Annuler</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleObjectifFields() {
            const select = document.getElementById('sport');
            const selectedOption = select.options[select.selectedIndex];

            if (!selectedOption || !selectedOption.hasAttribute('data-is-speed')) {
                return;
            }

            const isSpeed = selectedOption.getAttribute('data-is-speed') === 'true';
            const distanceGroup = document.getElementById('distanceGroup');
            const distanceInput = document.getElementById('distance');

            if (isSpeed) {
                distanceGroup.style.display = 'block';
            } else {
                distanceGroup.style.display = 'none';
                distanceInput.value = 0;
            }
        }

        window.onload = function() {
            toggleObjectifFields();
        };
    </script>
</body>
</html>
