<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modifier le mot de passe</title>
    <link rel="stylesheet" th:href="@{/css/sport.css}">
</head>
<body>
<h2>Modifier mon mot de passe</h2>

<div th:if="${error}" style="color: red; margin-bottom: 15px;">
    <p th:text="${error}"></p>
</div>

<form th:action="@{/user/profile/update-password/{id}(id=${userId})}" method="post">
    <div style="margin-bottom: 15px;">
        <label for="ancienMdp">Ancien mot de passe :</label><br/>
        <input type="password" id="ancienMdp" name="ancienMdp" required />
    </div>

    <div style="margin-bottom: 15px;">
        <label for="nouveauMdp">Nouveau mot de passe :</label><br/>
        <input type="password" id="nouveauMdp" name="nouveauMdp" required />
    </div>

    <div style="margin-bottom: 15px;">
        <label for="confirmMdp">Confirmer le nouveau mot de passe :</label><br/>
        <input type="password" id="confirmMdp" name="confirmMdp" required />
    </div>

    <div>
        <button type="submit">Confirmar le changement</button>
        <a th:href="@{/user/profile/{id}(id=${userId})}">
            <button type="button">Annuler</button>
        </a>
    </div>
</form>
</body>
</html>
