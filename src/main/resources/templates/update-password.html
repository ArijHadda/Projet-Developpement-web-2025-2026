<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le mot de passe - KudoSport</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-profile">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/user/profile/{id}(id=${userId})}" class="navbar-brand">
                🏃 KudoSport
            </a>
            <ul class="navbar-nav">
                <li><a th:href="@{/activite/list}">Mes Activités</a></li>
                <li><a th:href="@{/objectif/list}">Objectifs</a></li>
                <li><a th:href="@{/challenge/list}">Challenges</a></li>
                <li><a th:href="@{/user/ami/chercher}">Amis</a></li>
                <li><a th:href="@{/user/logout}">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: 2rem auto;">
            <h1>🔒 Modifier mon mot de passe</h1>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/user/profile/update-password/{id}(id=${userId})}" method="post">
                <div class="form-group">
                    <label for="ancienMdp">🔑 Ancien mot de passe</label>
                    <input type="password" id="ancienMdp" name="ancienMdp" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="nouveauMdp">🔐 Nouveau mot de passe</label>
                    <input type="password" id="nouveauMdp" name="nouveauMdp" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="confirmMdp">🔐 Confirmer le nouveau mot de passe</label>
                    <input type="password" id="confirmMdp" name="confirmMdp" class="form-control" required />
                </div>

                <div class="flex gap-sm" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">💾 Confirmer le changement</button>
                    <a th:href="@{/user/profile/{id}(id=${userId})}" class="btn btn-outline">❌ Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
