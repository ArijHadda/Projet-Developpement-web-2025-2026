<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des utilisateurs - KudoSport</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-profile">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}" class="navbar-brand">
                🏃 KudoSport
            </a>
            <ul class="navbar-nav">
                <li><a th:href="@{/activite/list}">Mes Activités</a></li>
                <li><a th:href="@{/objectif/list}">Objectifs</a></li>
                <li><a th:href="@{/challenge/list}">Challenges</a></li>
                <li><a th:href="@{/user/ami/chercher}">Amis</a></li>
                <li><a th:href="@{/user/logout}">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="flex justify-between items-center" style="margin: 2rem 0;">
            <h1>🔍 Chercher des amis</h1>
            <a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}" class="btn btn-outline">
                🔙 Retour au profil
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div class="card">
            <form th:action="@{/user/ami/chercher}" method="get" class="flex gap-sm" style="margin-bottom: 1.5rem;">
                <input type="text" name="motCle" th:value="${motCle}" class="form-control" placeholder="Rechercher par nom ou prénom..."/>
                <button type="submit" class="btn btn-primary">🔍 Chercher</button>
                <a th:if="${motCle != null and !motCle.isEmpty()}" th:href="@{/user/ami/chercher}" class="btn btn-outline">
                    ✖ Annuler
                </a>
            </form>

            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>👤 Nom</th>
                            <th>📝 Prénom</th>
                            <th>📧 Email</th>
                            <th>⚧ Sexe</th>
                            <th>🎂 Âge</th>
                            <th>🏃 Niveau de pratique</th>
                            <th>⚡ Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${utiliste}" th:if="${u.id != session.loggedInUser.id}">
                            <td th:text="${u.nom}"></td>
                            <td th:text="${u.prenom}"></td>
                            <td th:text="${u.mail}"></td>
                            <td th:text="${u.sexe}"></td>
                            <td th:text="${u.age}"></td>
                            <td th:switch="${#lists.isEmpty(u.listSportNivPratique)}">
                                <span th:case="true" class="text-muted">Aucune information</span>
                                <ul th:case="*" style="list-style: none; padding: 0; margin: 0;">
                                    <li th:each="sn : ${u.listSportNivPratique}" class="badge badge-info" style="margin: 0.25rem;">
                                        <span th:text="${sn.sport.nom}"></span> - <span th:text="${sn.niveau}"></span>
                                    </li>
                                </ul>
                            </td>
                            <td>
                                <span th:if="${#lists.contains(mesAmis, u)}" class="badge badge-success">✅ Déjà ami</span>
                                <span th:if="${!#lists.contains(mesAmis, u) && #lists.contains(waitingIds, u.id)}" class="badge badge-warning">⏳ En attente...</span>
                                <form th:if="${!#lists.contains(mesAmis, u) && !#lists.contains(waitingIds, u.id)}"
                                      th:action="@{/user/ami/demander/{id}(id=${u.id})}" method="post">
                                    <button type="submit" class="btn btn-primary btn-sm">➕ Ajouter</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
