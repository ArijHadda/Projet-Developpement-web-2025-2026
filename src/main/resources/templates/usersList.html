<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Liste des utilisateurs</title>
</head>
<body>
<h2>Chercher des amis</h2>
<div th:if="${success}" style="background-color: #d4edda; color: #155724; padding: 10px; margin-bottom: 15px; border: 1px solid #c3e6cb; border-radius: 4px;">
    <span th:text="${success}"></span>
</div>

<div th:if="${error}" style="background-color: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border: 1px solid #f5c6cb; border-radius: 4px;">
    <span th:text="${error}"></span>
</div>
<a th:href="@{/user/profile/{id}(id=${session.loggedInUser.id})}">← Retour au profil</a>
<hr/>
<table>
    <tr>
        <td>Nom</td>
        <td>Prenom</td>
        <td>Mail</td>
        <td>Sexe</td>
        <td>Age</td>
<!--        <td>Niveau de pratique</td>-->
    </tr>
    <tr th:each="u : ${utiliste}" th:if="${u.id != session.loggedInUser.id}">
        <td th:text="${u.nom}"></td>
        <td th:text="${u.prenom}"></td>
        <td th:text="${u.mail}"></td>
        <td th:text="${u.sexe}"></td>
        <td th:text="${u.age}"></td>
<!--        <td th:text="${u.niveauPratique}"></td>-->
        <td>
            <span th:if="${#lists.contains(mesAmis, u)}" style="color: green;">✅ Déjà ami</span>

            <span th:if="${!#lists.contains(mesAmis, u) && #lists.contains(waitingIds, u.id)}" style="color: orange;">⏳ En attente...</span>

            <form th:if="${!#lists.contains(mesAmis, u) && !#lists.contains(waitingIds, u.id)}"
                  th:action="@{/user/ami/demander/{id}(id=${u.id})}" method="post">
                <button type="submit">➕ Ajouter</button>
            </form>
        </td>
    </tr>
</table>

</body>
</html>
