# Configuration pour les tests : base de donnees H2 en memoire
# Remplace automatiquement src/main/resources/application.properties lors des tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate avec H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desactiver la console H2 (inutile en test)
spring.h2.console.enabled=false

# TMDB (valeurs fictives pour les tests)
tmdb.api-key=test-key
tmdb.base-url=http://localhost
